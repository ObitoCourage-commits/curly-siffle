<head>
    <style>
        body {
            overflow: hidden;
            background: #000000;
            margin-top: 0;
            margin-left: 0;
            color: #000000;
        }
        #startButton {
            display: block;
            width: 160px;
            height: 40px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            margin: 20px auto;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            box-shadow: 0px 0px 10px 2px #000000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div style="width: 100vw; height: 100vh; max-width:100%">
        <div id="game" style="display: none;"></div>
        <button id="startButton">PLAY</button>
    </div>
    <script>
        document.getElementById("game").style.display = "none";
       function startGame() {
    const gameDiv = document.getElementById("game");
    const button = document.getElementById("startButton");

    gameDiv.style.display = "block";
    button.style.display = "none";

    // ✅ MUST be on window
    window.EJS_player = "#game";
    window.EJS_core = "gba";
    window.EJS_gameName = "Jurassic Park III: Island Attack";
    window.EJS_color = "#0064ff";
    window.EJS_startOnLoaded = true;

    // ❗ TEMP: remove BIOS for testing
    // window.EJS_biosUrl = "...";

    window.EJS_gameUrl = "https://raw.githubusercontent.com/ObitoCourage-commits/html/main/Jurassic%20Park%20III%3A%20Island%20Attack/Jurassic%20Park%20III%20-%20Island%20Attack%20(USA).gba";

    window.EJS_pathtodata = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data";

    // ✅ LOAD AFTER everything is set
    const script = document.createElement("script");
    script.src = window.EJS_pathtodata + "/loader.js";

    script.onload = () => console.log("Emulator loaded");
    script.onerror = () => console.error("FAILED TO LOAD EMULATOR");

    document.body.appendChild(script);
}
    </script>
</body>
